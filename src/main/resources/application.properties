spring.application.name=global-class-booking-system
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/global_class_booking?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=test

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Required when using data.sql with Hibernate-generated tables.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
